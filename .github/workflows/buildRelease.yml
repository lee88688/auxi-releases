name: Build & Release

on:
  workflow_dispatch:
    inputs:
      sourceRef:
        description: "源码仓库 ref（branch/tag/commit）"
        required: false
        default: "main"
      tag:
        description: "Release tag（例如 v0.1.0），留空则自动生成"
        required: false
      prerelease:
        description: "是否标记为预发布"
        required: false
        default: false
        type: boolean
      draft:
        description: "是否创建草稿 Release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # 要构建的源码仓库（可按需修改）
  SOURCE_REPO: lee88688/auxi
  SOURCE_PATH: source
  NODE_VERSION: "22.17.1"
  PNPM_VERSION: "9"

  # 默认不做代码签名
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v4

      - name: Checkout (source repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ inputs.sourceRef }}
          token: ${{ secrets.AUXI_SOURCE_TOKEN }}
          path: ${{ env.SOURCE_PATH }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.SOURCE_PATH }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.SOURCE_PATH }}
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (with deps)
        working-directory: ${{ env.SOURCE_PATH }}
        run: pnpm exec playwright install --with-deps

      - name: Unit tests
        working-directory: ${{ env.SOURCE_PATH }}
        run: pnpm test

      - name: E2E tests
        working-directory: ${{ env.SOURCE_PATH }}
        run: xvfb-run -a pnpm test:e2e

  build:
    name: Build (Windows)
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v4

      - name: Checkout (source repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ inputs.sourceRef }}
          token: ${{ secrets.AUXI_SOURCE_TOKEN }}
          path: ${{ env.SOURCE_PATH }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.SOURCE_PATH }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.SOURCE_PATH }}
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ${{ env.SOURCE_PATH }}
        run: pnpm build:win

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          if-no-files-found: error
          path: |
            ${{ env.SOURCE_PATH }}/dist/**

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-${{ inputs.sourceRef }}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (source repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ inputs.sourceRef }}
          token: ${{ secrets.AUXI_SOURCE_TOKEN }}
          path: ${{ env.SOURCE_PATH }}

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          src_dir="${{ env.SOURCE_PATH }}"
          out_file="release-notes.md"

          is_safe_ref() {
            [[ "$1" =~ ^[A-Za-z0-9._-]+$ ]]
          }

          try_copy_notes_file() {
            local ref="$1"
            if ! is_safe_ref "$ref"; then
              return 1
            fi
            local candidate="$src_dir/docs/releases/$ref.md"
            if [[ -f "$candidate" ]]; then
              cp "$candidate" "$out_file"
              return 0
            fi
            return 1
          }

          try_tag_notes() {
            local ref="$1"
            if ! is_safe_ref "$ref"; then
              return 1
            fi
            if git -C "$src_dir" show-ref --tags --verify --quiet "refs/tags/$ref"; then
              git -C "$src_dir" for-each-ref "refs/tags/$ref" --format='%(contents)' > "$out_file" || true
              if [[ -s "$out_file" ]]; then
                return 0
              fi
            fi
            return 1
          }

          # 优先级：
          # 1) 源码仓库中的 docs/releases/<tag>.md（与版本 tag 绑定，最稳定）
          # 2) 源码仓库的 annotated tag message（适合把 notes 写进 tag）
          # 3) 源码仓库当前 ref 的 commit message（兜底）
          rm -f "$out_file"

          if [[ -n "${{ inputs.tag }}" ]]; then
            try_copy_notes_file "${{ inputs.tag }}" || true
            if [[ ! -s "$out_file" ]]; then
              try_tag_notes "${{ inputs.tag }}" || true
            fi
          fi

          if [[ ! -s "$out_file" ]]; then
            try_copy_notes_file "${{ inputs.sourceRef }}" || true
          fi

          if [[ ! -s "$out_file" ]]; then
            try_tag_notes "${{ inputs.sourceRef }}" || true
          fi

          if [[ ! -s "$out_file" ]]; then
            git -C "$src_dir" show -s --format=%B HEAD > "$out_file"
          fi

          if [[ ! -s "$out_file" ]]; then
            echo "（未提供 Release Notes）" > "$out_file"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          body_path: release-notes.md
          files: dist/**/*
